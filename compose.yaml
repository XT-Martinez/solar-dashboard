services:
  influxdb:
    image: docker.io/library/influxdb:2.7
    container_name: solar-poc-influxdb
    ports:
      - "3500:3000"
    volumes:
      - solar-poc-influxdb:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-change-me-solar}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-solar}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-solar}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-solar-token}

  grafana:
    image: docker.io/grafana/grafana-oss:10.4.12
    container_name: solar-poc-grafana
    network_mode: "service:influxdb"
    depends_on:
      - influxdb
    volumes:
      - solar-poc-grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:Z
      - ./grafana/dashboards:/var/lib/grafana/dashboards:Z
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USERNAME:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}

  telegraf:
    image: docker.io/library/telegraf:1.30
    container_name: solar-poc-telegraf
    network_mode: "service:influxdb"
    user: telegraf
    depends_on:
      - influxdb
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:Z,ro
    environment:
      INVERTER_HOST: ${INVERTER_HOST:-192.168.254.152}
      POLL_INTERVAL: ${POLL_INTERVAL:-5s}
      INSIDE_TEMP_REGISTER: ${INSIDE_TEMP_REGISTER:-5007}
      INFLUX_ORG: ${INFLUX_ORG:-solar}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-solar}
      INFLUX_TOKEN: ${INFLUX_TOKEN:-solar-token}

volumes:
  solar-poc-influxdb:
  solar-poc-grafana:
