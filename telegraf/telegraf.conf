[agent]
  interval = "${POLL_INTERVAL}"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "${POLL_INTERVAL}"
  flush_jitter = "0s"
  precision = "0s"
  hostname = "sungrow"
  omit_hostname = false

[[inputs.modbus]]
  name = "sungrow_mg6rl"
  slave_id = 1
  timeout = "2s"
  controller = "tcp://${INVERTER_HOST}:502"
  configuration_type = "register"

  input_registers = [
    { measurement = "sungrow", name = "daily_yield_kwh", byte_order = "AB", data_type = "UFIXED", scale = 0.1, address = [5002] },
    { measurement = "sungrow", name = "total_yield_kwh", byte_order = "CDAB", data_type = "UFIXED", scale = 0.1, address = [5003,5004] },
    { measurement = "sungrow", name = "inside_temperature_c", byte_order = "AB", data_type = "FIXED", scale = 0.1, address = [${INSIDE_TEMP_REGISTER}] },
    { measurement = "sungrow", name = "mppt1_voltage_v", byte_order = "AB", data_type = "UFIXED", scale = 0.1, address = [5010] },
    { measurement = "sungrow", name = "mppt1_current_a", byte_order = "AB", data_type = "UFIXED", scale = 0.1, address = [5011] },
    { measurement = "sungrow", name = "mppt2_voltage_v", byte_order = "AB", data_type = "UFIXED", scale = 0.1, address = [5012] },
    { measurement = "sungrow", name = "mppt2_current_a", byte_order = "AB", data_type = "UFIXED", scale = 0.1, address = [5013] },
    { measurement = "sungrow", name = "total_dc_power_w", byte_order = "CDAB", data_type = "UINT32", scale = 1.0, address = [5016,5017] },
    { measurement = "sungrow", name = "phase_a_voltage_v", byte_order = "AB", data_type = "UFIXED", scale = 0.1, address = [5018] },
    { measurement = "sungrow", name = "phase_b_voltage_v", byte_order = "AB", data_type = "UFIXED", scale = 0.1, address = [5019] },
    { measurement = "sungrow", name = "phase_c_voltage_v", byte_order = "AB", data_type = "UFIXED", scale = 0.1, address = [5020] },
    { measurement = "sungrow", name = "grid_frequency_hz", byte_order = "AB", data_type = "UFIXED", scale = 0.1, address = [5035] },
    { measurement = "sungrow", name = "running_state", byte_order = "AB", data_type = "UINT16", scale = 1.0, address = [13000] },
    { measurement = "sungrow", name = "load_power_w", byte_order = "CDAB", data_type = "INT32", scale = 1.0, address = [13007,13008] },
    { measurement = "sungrow", name = "export_power_w", byte_order = "CDAB", data_type = "INT32", scale = 1.0, address = [13009,13010] },
    { measurement = "sungrow", name = "battery_current_a", byte_order = "AB", data_type = "UFIXED", scale = 0.1, address = [13020] },
    { measurement = "sungrow", name = "battery_power_w", byte_order = "AB", data_type = "INT16", scale = 1.0, address = [13021] },
    { measurement = "sungrow", name = "battery_soc_percent", byte_order = "AB", data_type = "UFIXED", scale = 0.1, address = [13022] },
    { measurement = "sungrow", name = "battery_soh_percent", byte_order = "AB", data_type = "UFIXED", scale = 0.1, address = [13023] },
    { measurement = "sungrow", name = "battery_temperature_c", byte_order = "AB", data_type = "FIXED", scale = 0.1, address = [13024] }
  ]

[[outputs.influxdb_v2]]
  urls = ["http://127.0.0.1:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"
